<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif;
  }
  .calculator {
    background: #16213e; border-radius: 20px; padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); width: 380px;
  }
  .display {
    background: #0f3460; border-radius: 12px; padding: 20px;
    margin-bottom: 20px; text-align: right; min-height: 100px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .display .expression {
    color: #a0a0b0; font-size: 18px; min-height: 24px;
    word-break: break-all;
  }
  .display .result {
    color: #fff; font-size: 40px; font-weight: 300;
    word-break: break-all; line-height: 1.2;
  }
  .buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  button {
    border: none; border-radius: 12px; padding: 16px 8px;
    font-size: 16px; cursor: pointer; transition: all 0.15s;
    font-weight: 500;
  }
  button:active { transform: scale(0.95); }
  .btn-num { background: #1a1a3e; color: #fff; }
  .btn-num:hover { background: #2a2a5e; }
  .btn-op { background: #e94560; color: #fff; }
  .btn-op:hover { background: #ff6b81; }
  .btn-func { background: #0f3460; color: #e94560; }
  .btn-func:hover { background: #1a4a80; }
  .btn-eq { background: #e94560; color: #fff; font-size: 20px; }
  .btn-eq:hover { background: #ff6b81; }
  .btn-zero { grid-column: span 2; }
</style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="buttons">
    <button class="btn-func" onclick="clearAll()">AC</button>
    <button class="btn-func" onclick="deleteLast()">⌫</button>
    <button class="btn-func" onclick="appendOp('(')">(</button>
    <button class="btn-func" onclick="appendOp(')')">)</button>
    <button class="btn-op" onclick="appendOp('/')">÷</button>

    <button class="btn-func" onclick="appendOp('**')">xʸ</button>
    <button class="btn-func" onclick="appendOp('sqrt(')">√</button>
    <button class="btn-func" onclick="appendOp('**2')">x²</button>
    <button class="btn-func" onclick="appendOp('PI')">π</button>
    <button class="btn-op" onclick="appendOp('*')">×</button>

    <button class="btn-num" onclick="appendNum('7')">7</button>
    <button class="btn-num" onclick="appendNum('8')">8</button>
    <button class="btn-num" onclick="appendNum('9')">9</button>
    <button class="btn-func" onclick="appendOp('%')">%</button>
    <button class="btn-op" onclick="appendOp('-')">−</button>

    <button class="btn-num" onclick="appendNum('4')">4</button>
    <button class="btn-num" onclick="appendNum('5')">5</button>
    <button class="btn-num" onclick="appendNum('6')">6</button>
    <button class="btn-func" onclick="appendOp('sin(')">sin</button>
    <button class="btn-op" onclick="appendOp('+')">+</button>

    <button class="btn-num" onclick="appendNum('1')">1</button>
    <button class="btn-num" onclick="appendNum('2')">2</button>
    <button class="btn-num" onclick="appendNum('3')">3</button>
    <button class="btn-func" onclick="appendOp('cos(')">cos</button>
    <button class="btn-func" onclick="appendOp('tan(')">tan</button>

    <button class="btn-num btn-zero" onclick="appendNum('0')">0</button>
    <button class="btn-num" onclick="appendNum('.')">.</button>
    <button class="btn-func" onclick="appendOp('log(')">log</button>
    <button class="btn-func" onclick="appendOp('ln(')">ln</button>

    <button class="btn-func" onclick="appendOp('E')">e</button>
    <button class="btn-func" onclick="toggleSign()">±</button>
    <button class="btn-func" onclick="appendOp('abs(')">|x|</button>
    <button class="btn-func" onclick="reciprocal()">1/x</button>
    <button class="btn-eq" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let expr = '';

  function updateDisplay() {
    document.getElementById('expression').textContent = expr || '';
    if (expr === '') {
      document.getElementById('result').textContent = '0';
    }
  }

  function appendNum(n) {
    expr += n;
    updateDisplay();
  }

  function appendOp(op) {
    expr += op;
    updateDisplay();
  }

  function clearAll() {
    expr = '';
    updateDisplay();
  }

  function deleteLast() {
    // Delete the last token (function name, operator, or single char)
    const funcs = ['sqrt(', 'sin(', 'cos(', 'tan(', 'log(', 'ln(', 'abs(', '**2', '**', 'PI'];
    for (const f of funcs) {
      if (expr.endsWith(f)) {
        expr = expr.slice(0, -f.length);
        updateDisplay();
        return;
      }
    }
    expr = expr.slice(0, -1);
    updateDisplay();
  }

  function toggleSign() {
    updateDisplay();
    // Negation is handled during evaluation
    expr += '(-';
  }

  function reciprocal() {
    expr += '(1/';
    updateDisplay();
  }

  function calculate() {
    try {
      let e = expr;
      if (!e) return;

      // Replace display symbols with JS operators
      e = e.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');

      // Replace constants
      e = e.replace(/PI/g, `(${Math.PI})`);
      e = e.replace(/\bE\b/g, `(${Math.E})`);

      // Replace functions
      e = e.replace(/sqrt\(/g, 'Math.sqrt(');
      e = e.replace(/sin\(/g, 'Math.sin(');
      e = e.replace(/cos\(/g, 'Math.cos(');
      e = e.replace(/tan\(/g, 'Math.tan(');
      e = e.replace(/log\(/g, 'Math.log10(');
      e = e.replace(/ln\(/g, 'Math.log(');
      e = e.replace(/abs\(/g, 'Math.abs(');

      // Auto-close parentheses
      const openCount = (e.match(/\(/g) || []).length;
      const closeCount = (e.match(/\)/g) || []).length;
      for (let i = closeCount; i < openCount; i++) {
        e += ')';
      }

      // Handle percentage: X% → X/100
      e = e.replace(/([\d.]+)%/g, '($1/100)');

      // Handle ** (power)
      e = e.replace(/\*\*2/g, '**2');
      e = e.replace(/\*\*/g, '**');

      // Evaluate
      const result = Function('"use strict"; return (' + e + ')')();

      document.getElementById('result').textContent = formatResult(result);
      document.getElementById('expression').textContent = expr + ' =';
      expr = String(result);
    } catch (err) {
      document.getElementById('result').textContent = '错误';
      setTimeout(() => { if (document.getElementById('result').textContent === '错误') updateDisplay(); }, 1000);
    }
  }

  function formatResult(n) {
    if (!isFinite(n)) return n > 0 ? '∞' : '−∞';
    if (isNaN(n)) return 'NaN';
    // Limit decimal places for floating point
    if (Math.abs(n) < 1e-10 && n !== 0) return n.toExponential(6);
    if (Math.abs(n) > 1e12) return n.toExponential(6);
    // Round to avoid floating-point artifacts
    const s = parseFloat(n.toPrecision(12)).toString();
    return s.length > 14 ? parseFloat(n.toPrecision(10)).toString() : s;
  }

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '.') appendNum('.');
    else if (e.key === '+') appendOp('+');
    else if (e.key === '-') appendOp('-');
    else if (e.key === '*') appendOp('*');
    else if (e.key === '/') { e.preventDefault(); appendOp('/'); }
    else if (e.key === '(') appendOp('(');
    else if (e.key === ')') appendOp(')');
    else if (e.key === '%') appendOp('%');
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') deleteLast();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '^') appendOp('**');
  });
</script>

</body>
</html>
